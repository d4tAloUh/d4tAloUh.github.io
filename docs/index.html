<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socks</title>
    <script src="https://kit.fontawesome.com/4ff8e2983e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <link rel="stylesheet" href="./css/main.css">
    <link rel="icon" href="../IMG/img_random.jpg ">
</head>
<body>
<div class="main-container">
    <nav class="navbar">
        <div class="navbar-center">
            <div class="cart-btn">
            <span class="nav-icon">
            <i class="fas fa-shopping-cart"></i>
          </span>
                <div class="cart-items">0</div>
            </div>
            <div class="navbar-title">
                <Strong><a href="#">Socks</a></Strong>
            </div>
            <div class="dropdown dropdown-menu-left">
                <button class="btn dropdown-toggle" type="button" data-toggle="dropdown">
                    <i class="fas fa-bars"></i>
                </button>
                <ul class="dropdown-menu">
                    <li><a href="#" class="dropdown-item">Link1</a></li>
                    <li><a href="#" class="dropdown-item">Link2</a></li>
                    <li><a href="#" class="dropdown-item">Link3</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <section class="products">
        <div class="categories-container">
            <ul class="categories">
                <li class="category"><span class="selected">All items</span></li>
            </ul>
        </div>
        <div class="products-table">


        </div>
    </section>

    <div class="full-product-container">
        <div class="full-product-content">
            <div class="full-image-container">
                <div class="full-image"><img src="../IMG/img_random.jpg " class="img-class"></div>
            </div>
            <div class="full-product-main">
                <div class="full-name">Nazvanie</div>
                <div class="full-legend-container">
                    <div class="full-legend">Opisanie</div>
                </div>
            </div>
            <div class="full-close"></div>
        </div>
    </div>

    <div class="cart-overlay">
        <div class="cart">
            <span class="close-cart"><i class="far fa-window-close"></i></span>
            <h2>your cart</h2>
            <div class="cart-content"></div>
            <div class="cart-footer">
                <h3>your total : $<span class="cart-total">0</span></h3>
                <button class="clear-cart cart-button">clear cart</button>
            </div>
        </div>
    </div>
</div>
<footer class="page-footer ">

    <!-- Copyright -->
    <div class="text-center py-3">2019 Copyright:
        <a href="https://instagram.com/alouh_kostrulya" target="_blank"> OmegaLUL</a>
    </div>
    <!-- Copyright -->

</footer>
<script src="./js/main.js"></script>

</body>
</html>
